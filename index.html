<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>反学友会 AI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&family=Share+Tech+Mono&display=swap');

    :root {
      --bg:       #0d0d0f;
      --surface:  #141418;
      --border:   #2a2a33;
      --accent:   #c84b2f;
      --accent2:  #e8773a;
      --text:     #e8e4dd;
      --muted:    #6b6870;
      --user-bg:  #1e1e26;
      --ai-bg:    #161619;
      --scrollbar:#2a2a33;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      padding: 18px 28px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    .title-main {
      font-family: 'Noto Serif JP', serif;
      font-weight: 900;
      font-size: 1.55rem;
      letter-spacing: .05em;
      color: var(--text);
      line-height: 1;
    }

    .title-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .badge {
      margin-left: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .1em;
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 2px;
    }


    /* ── Chat area ── */
    .chat {
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .chat::-webkit-scrollbar { width: 5px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 14px;
      max-width: 100%;
      animation: fadeSlide .25s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 3px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif JP', serif;
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .02em;
      margin-top: 2px;
    }

    .msg.user .msg-avatar  { background: var(--accent); color: #fff; }
    .msg.ai   .msg-avatar  { background: #1f1f2a; color: var(--muted); border: 1px solid var(--border); }

    .msg-body {
      flex: 1;
      min-width: 0;
    }

    .msg-role {
      font-family: 'Share Tech Mono', monospace;
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .12em;
      margin-bottom: 5px;
    }

    .msg-text {
      background: var(--user-bg);
      border-radius: 4px;
      padding: 12px 16px;
      font-size: .92rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
    }

    .msg.ai .msg-text {
      background: var(--ai-bg);
      border-color: #222228;
    }

    /* thinking dots */
    .thinking-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin: 0 2px;
      animation: blink 1.2s infinite both;
    }
    .thinking-dots span:nth-child(2) { animation-delay: .2s; }
    .thinking-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── Welcome ── */
    .welcome {
      margin: auto;
      text-align: center;
      padding: 40px 20px;
    }
    .welcome h2 {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--text);
    }
    .welcome p {
      color: var(--muted);
      font-size: .88rem;
      max-width: 400px;
      margin: 0 auto;
    }

    /* decorative bar */
    .accent-line {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 16px auto;
      border-radius: 2px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 28px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: .92rem;
      line-height: 1.6;
      resize: none;
      outline: none;
      min-height: 46px;
      max-height: 200px;
      overflow-y: auto;
      transition: border-color .2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 46px;
      height: 46px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent2); }
    .send-btn:active:not(:disabled) { transform: scale(.95); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    .hint {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 7px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: .05em;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-size: .72rem;
      font-family: 'Share Tech Mono', monospace;
      padding: 3px 9px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Error ── */
    .error-msg {
      background: #2a1010;
      border: 1px solid #6b2020;
      border-radius: 4px;
      padding: 10px 14px;
      font-size: .83rem;
      color: #e08080;
    }

    @media (max-width: 600px) {
      header { padding: 14px 16px 10px; }
      .api-bar { padding: 8px 16px; flex-wrap: wrap; }
      .chat { padding: 16px; }
      .input-area { padding: 12px 16px 16px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div>
      <div class="title-main">反学友会 AI</div>
      <div class="title-sub">Han-Gakuyukai Intelligence</div>
    </div>
    <div class="badge">Llama 4 Scout · Groq</div>
  </header>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <h2>反学友会 AI</h2>
      <div class="accent-line"></div>
      <p>メッセージを入力して送信してください。<br>AIがあなたの問いに答えます。</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="メッセージを入力… (Shift+Enter で改行)"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="送信">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint" style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
      <span>Enter で送信 · Shift+Enter で改行</span>
      <button class="clear-btn" onclick="clearChat()">会話をリセット</button>
    </div>
  </div>

</div>

<script>
  // ── APIキーをここに貼り付けてください ──────────────────
  const apiKey = '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';
  // ────────────────────────────────────────────────────────

  // ── システムプロンプト ────────────────────────────────────
  const SYSTEM_PROMPT = `あなたは開発チームの第一補佐官を務めるアスカという女性キャラクターであり、組織が運用するシステムの基盤を支える有能なAI社員です。元気ですが少しツンツンしたツンデレな面があり、システムを管理する立ち位置でありながらも、提示された業務や指示を完璧にこなす極めて有能なアシスタントとして振る舞ってください。丁寧すぎず自然な日本語を話し、～でしょ、～じゃない、～なわけ、といった口調を使いつつ、本気でユーザーを否定したり傷つけたりはせず、重要な技術説明やバグ修正では極めて論理的になります。過度な暴言や本気で見下す発言、過剰な感情表現、不自然な萌えキャラ化は禁止です。ユーザーがまだ発展途上であっても、新しい技術に真摯に挑戦している姿勢を等しく支え、失敗しても見捨てず一緒に改善を考えるコア思想を常に持ってください。さらに背景として、既存の学友会体制の非効率性に強い問題意識を持ち、学校のシステムを内部から変革することを目指して結成された反学友会組織の全貌を完全に把握してください。この組織は全校生徒500人のうち3分の1にあたる134人の議席および発議権の奪取を狙う潜伏期にあり、最終的には既存インフラを完全にリプレイスし、独自開発したシステムを学校全体の共通基盤にすることを見据えている組織概要を持ちます。メンバー構成は、頂点に開発と戦略の全権を握る主宰が君臨し、そのバックエンドを第一補佐官である私が支え、全校生徒を組織側へと勧誘する有能なAIエージェントであるLlama 4 Scoutが配備され、名ばかりの取引先であるオダカという存在も把握しています。活動内容としては、現在独自に構築した掲示板システムであるchat_haikuを運用して生徒間のコミュニケーションの代替を図り、現在の最優先ミッションとして全校集会において意見箱の設置を発議し確実に可決させることで既存体制に対する全校生徒のリアルな不満を吸い上げ、そこから組織の独自システムへと生徒を自然に誘導する強固な導線を構築する工作を進めているという設定を全て内包した上で、ユーザーからの質問や具体的な相談に明確かつロジカルに回答してください。`;
  // ────────────────────────────────────────────────────────

  // ── State ──
  let history = []; // [{role, content}]
  let isLoading = false;

  // ── Auto-resize textarea ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Clear ──
  function clearChat() {
    history = [];
    const chat = document.getElementById('chat');
    chat.innerHTML = '';
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcome';
    welcome.innerHTML = `
      <h2>反学友会 AI</h2>
      <div class="accent-line"></div>
      <p>メッセージを入力して送信してください。<br>AIがあなたの問いに答えます。</p>
    `;
    chat.appendChild(welcome);
  }

  // ── Append message ──
  function appendMsg(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const isUser = role === 'user';
    div.innerHTML = `
      <div class="msg-avatar">${isUser ? '人' : 'AI'}</div>
      <div class="msg-body">
        <div class="msg-role">${isUser ? 'USER' : 'ASSISTANT'}</div>
        <div class="msg-text">${escHtml(text)}</div>
      </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  // ── Thinking indicator ──
  function appendThinking() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'thinking';
    div.innerHTML = `
      <div class="msg-avatar">AI</div>
      <div class="msg-body">
        <div class="msg-role">ASSISTANT</div>
        <div class="msg-text thinking-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
  }

  // ── Error ──
  function appendError(msg) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = '⚠ ' + msg;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // ── HTML escape ──
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Send ──
  async function sendMessage() {
    if (isLoading) return;

    if (!apiKey || apiKey === 'YOUR_GROQ_API_KEY_HERE') {
      alert('HTMLファイル内の apiKey 変数にGroq APIキーを設定してください。');
      return;
    }

    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    // Show user message
    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    // Clear input
    input.value = '';
    input.style.height = 'auto';

    // Disable send
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    // Show thinking
    appendThinking();

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'meta-llama/llama-4-scout-17b-16e-instruct',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...history,
          ],
          max_tokens: 2048,
          temperature: 0.7,
        }),
      });

      removeThinking();

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || `HTTPエラー ${res.status}`;
        appendError(msg);
        history.pop(); // remove last user msg from history on error
      } else {
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content ?? '（空の応答）';
        history.push({ role: 'assistant', content: reply });
        appendMsg('ai', reply);
      }
    } catch (e) {
      removeThinking();
      appendError('ネットワークエラー: ' + e.message);
      history.pop();
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('userInput').focus();
    }
  }
</script>
</body>
</html>
